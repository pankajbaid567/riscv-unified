kind: instruction
name: add
long_name: Integer add
description: 'Add the value in xs1 to xs2, and store the result in xd.

  Any overflow is thrown away.

  '
definedBy: I
assembly: xd, xs1, xs2
encoding:
  match: 0000000----------000-----0110011
  variables: null
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: true
operation(): X[xd] = X[xs1] + X[xs2];
